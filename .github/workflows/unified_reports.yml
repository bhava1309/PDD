          | 2 | Homepage | `test_hero_banner_cta_clickable` | ✅ PASSED |
          | 3 | Homepage | `test_responsive_layout_mobile_view` | ✅ PASSED |
          | 4 | Authentication | `test_user_login_valid_credentials` | ✅ PASSED |
          | 5 | Authentication | `test_login_invalid_password_error_msg` | ✅ PASSED |
